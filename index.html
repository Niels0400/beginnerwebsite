<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Hack Portal</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .login-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 20, 0, 0.92); padding: 40px; border: 2px solid #00ff00;
            box-shadow: 0 0 30px #00ff00; text-align: center; color: #00ff00; max-width: 420px;
        }
        input { padding: 12px; width: 260px; background: #000; border: 1px solid #00ff00; color: #00ff00; margin-bottom: 20px; text-align: center; font-size: 1.1em; outline: none; }
        .main-btn { padding: 12px 28px; background: #00ff00; color: #000; border: none; cursor: pointer; font-weight: bold; font-size: 1em; }
        .main-btn:hover { background: #88ff88; }
        .hint-btn { background: transparent; color: #00ff00; border: 1px solid #00ff00; padding: 6px 16px; margin-top: 20px; cursor: pointer; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; }
        .hint-btn:hover { background: rgba(0, 255, 0, 0.1); }
        #hintContainer { margin-top: 18px; text-align: left; }
        .hint-text { color: #ffff00; font-size: 0.9em; margin: 6px 0; text-shadow: 0 0 5px #ffff00; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="login-box">
        <h1>HACK PORTAL</h1>
        <p>Dit is een open hackdemo. Zoek de sleutel in de code en ga verder.</p>
        <input type="text" id="passwordInput" placeholder="VOER CODE OF GEEF ENTER" onkeydown="if(event.key === 'Enter') checkPassword()">
        <br>
        <button class="main-btn" onclick="checkPassword()">START HACK</button>
        <br>
        <button id="hintKnop" class="hint-btn" onclick="showHint()">TOON EEN HINT</button>
        <div id="hintContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
