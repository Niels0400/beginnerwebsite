<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Systeem Ontgrendeld</title>
    <script>
        function checkToegang() {
            const cookies = document.cookie.split('; ');
            const cookieData = cookies.find(row => row.startsWith('Sessie_Sleutel='));
            const waarde = cookieData ? cookieData.split('=')[1] : null;
            if (waarde !== atob('SGFjazEyMw==')) {
                window.location.href = 'index.html';
            }
        }
        checkToegang();
    </script>
    <style>
        * { box-sizing: border-box; }
        body { background: linear-gradient(135deg, #020202 0%, #090909 100%); color: #00ff00; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 700px; width: 95%; margin: 80px auto; background: rgba(0, 0, 0, 0.92); padding: 40px 20px; border-radius: 15px; border: 2px solid #00ff00; box-shadow: 0 0 50px rgba(0, 255, 0, 0.2); }
        h1 { color: #00ff00; font-size: 3em; margin-bottom: 20px; }
        .message { color: #d4ffd4; font-size: 1.1em; line-height: 1.6; margin-bottom: 30px; }
        .next-btn { background-color: #00ff00; color: #000; border: none; padding: 14px 28px; font-size: 1.1em; font-weight: bold; border-radius: 999px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
        .next-btn:hover { background-color: #88ff88; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TOEGANG ONTGRENDELD</h1>
        <p class="message">Je hebt de code gevonden en het systeem ge-hackt. Ga door naar de volgende demo.</p>
        <button class="next-btn" onclick="window.location.href='cadeau.html'">Volgende pagina</button>
    </div>
</body>
</html>
